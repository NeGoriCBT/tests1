# Собирает dist и пушит в ветку gh-pages (готовая статика Vite).
#
# После первого успешного запуска: Settings → Pages → Build and deployment →
# Source: Deploy from a branch → Branch: gh-pages, folder: / (root).
# (Если выбрано «GitHub Actions» — переключите на ветку gh-pages.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
